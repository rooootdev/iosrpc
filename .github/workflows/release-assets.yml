name: Build and Upload Release Assets

on:
  push:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid
        run: |
          brew update
          brew install ldid || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust dylibs
        working-directory: libiosrpc
        run: ./build-ios.sh

      - name: Stage dylib artifacts
        run: |
          mkdir -p release-assets
          cp libiosrpc/target/aarch64-apple-ios/release/libiosrpc.dylib release-assets/libiosrpc.dylib
          cp libiosrpc/target/aarch64-apple-ios-sim/release/libiosrpc.dylib release-assets/libiosrpc-sim.dylib
          cp libiosrpc/target/x86_64-apple-ios/release/libiosrpc.dylib release-assets/libiosrpc-x86_64.dylib

      - name: Sign dylib artifacts
        run: |
          if command -v ldid >/dev/null 2>&1; then
            ldid -S release-assets/libiosrpc.dylib
            ldid -S release-assets/libiosrpc-sim.dylib
            ldid -S release-assets/libiosrpc-x86_64.dylib
          else
            /usr/bin/codesign --force --sign - --timestamp=none release-assets/libiosrpc.dylib
            /usr/bin/codesign --force --sign - --timestamp=none release-assets/libiosrpc-sim.dylib
            /usr/bin/codesign --force --sign - --timestamp=none release-assets/libiosrpc-x86_64.dylib
          fi

      - name: Build iOS app (unsigned)
        run: |
          xcodebuild \
            -project example/iOSRPC.xcodeproj \
            -scheme iOSRPC \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA
        run: |
          APP_PATH="$RUNNER_TEMP/DerivedData/Build/Products/Release-iphoneos/iOSRPC.app"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/iOSRPC.app"
          rm -rf "$RUNNER_TEMP/ipa/Payload/iOSRPC.app/_CodeSignature" "$RUNNER_TEMP/ipa/Payload/iOSRPC.app/embedded.mobileprovision" || true

          if [ -f "$RUNNER_TEMP/ipa/Payload/iOSRPC.app/Frameworks/libiosrpc.dylib" ]; then
            if command -v ldid >/dev/null 2>&1; then
              ldid -S "$RUNNER_TEMP/ipa/Payload/iOSRPC.app/Frameworks/libiosrpc.dylib"
            else
              /usr/bin/codesign --force --sign - --timestamp=none "$RUNNER_TEMP/ipa/Payload/iOSRPC.app/Frameworks/libiosrpc.dylib"
            fi
          fi

          if command -v ldid >/dev/null 2>&1; then
            ldid -S"$GITHUB_WORKSPACE/example/Config/iOSRPC.trollstore.entitlements" "$RUNNER_TEMP/ipa/Payload/iOSRPC.app/iOSRPC"
          fi

          (cd "$RUNNER_TEMP/ipa" && /usr/bin/zip -qry iOSRPC.ipa Payload)
          cp "$RUNNER_TEMP/ipa/iOSRPC.ipa" release-assets/iOSRPC.ipa

      - name: Resolve latest release tag
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq '.tagName')
          if [ -z "$tag" ]; then
            echo "No latest release found." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Upload assets to latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.latest.outputs.tag }}" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
